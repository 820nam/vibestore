<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Blue background -->
  <rect width="200" height="200" fill="#0066FF"/>
  <!-- Ghost body (large white circle) -->
  <circle cx="98" cy="86" r="52" fill="white"/>
  <!-- Left eye -->
  <rect x="81" y="74" width="8" height="12" rx="4" fill="#0066FF"/>
  <!-- Right eye -->
  <rect x="99" y="74" width="8" height="12" rx="4" fill="#0066FF"/>
  <!-- Circle ring (lower-left inside body) -->
  <circle cx="78" cy="106" r="14" fill="none" stroke="#0066FF" stroke-width="5"/>
  <!-- Small bubble circle (upper-right outside body) -->
  <circle cx="143" cy="54" r="11" fill="white"/>
  <!-- Waggle text -->
  <text x="100" y="168" font-family="-apple-system, 'SF Pro Display', Arial, sans-serif" font-size="28" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-0.5">Waggle</text>
</svg>
