<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Blue background -->
  <rect width="100" height="100" rx="22" fill="#0066FF"/>
  <!-- Ghost body (large white circle) -->
  <circle cx="48" cy="56" r="32" fill="white"/>
  <!-- Left eye -->
  <circle cx="40" cy="50" r="5" fill="#0066FF"/>
  <!-- Right eye -->
  <circle cx="54" cy="50" r="5" fill="#0066FF"/>
  <!-- Speech bubble circle (top right) -->
  <circle cx="72" cy="34" r="10" fill="none" stroke="white" stroke-width="3.5"/>
  <!-- Small bubble dot (bottom left) -->
  <circle cx="26" cy="72" r="5" fill="none" stroke="white" stroke-width="3"/>
  <!-- Tiny bubble dot -->
  <circle cx="18" cy="82" r="3" fill="none" stroke="white" stroke-width="2.5"/>
</svg>
