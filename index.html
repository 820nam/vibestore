<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibestore — AI 바이브코딩 프로젝트 스토어</title>
  <meta name="description" content="AI 바이브코딩으로 만든 웹 프로젝트를 발견하고 공유하세요">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=3">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js?v=3"></script>
</head>
<body>

<nav class="ios-nav">
  <div class="nav-inner">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="7" fill="#007AFF"/>
        <path d="M7 16.5L12 11.5L16 15.5L20 11.5L25 16.5M7 21.5L12 16.5L16 20.5L20 16.5L25 21.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Vibestore</span>
    </div>
    <div class="nav-right">
      <button class="icon-btn" id="search-open-btn" aria-label="검색">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="pill-btn" id="submit-open-btn">등록하기</button>
    </div>
  </div>
</nav>

<div class="tab-bar">
  <div class="tab-inner">
    <button class="tab-btn active" data-tab="today">오늘</button>
    <button class="tab-btn" data-tab="trending">인기</button>
    <button class="tab-btn" data-tab="new">새로 나온</button>
    <button class="tab-btn" data-tab="categories">카테고리</button>
  </div>
</div>

<main id="main-content">

  <!-- Today Tab -->
  <div class="tab-panel active" id="panel-today">
    <div class="hero-wrap">
      <div class="hero-track" id="hero-track"></div>
      <div class="hero-dots" id="hero-dots"></div>
    </div>
    <div class="content-area">
      <div class="section-row">
        <div class="section-head">
          <div><p class="eyebrow">지금 뜨는</p><h2 class="section-title">인기 바이브 프로젝트</h2></div>
          <button class="see-all-btn" data-target="trending">전체 보기</button>
        </div>
        <div class="h-scroll-row" id="trending-row"></div>
      </div>
      <div class="section-row">
        <div class="section-head">
          <div><p class="eyebrow">도구별 탐색</p><h2 class="section-title">어떤 AI로 만들었나요?</h2></div>
        </div>
        <div class="aitool-grid" id="aitool-grid"></div>
      </div>
      <div class="section-row">
        <div class="section-head">
          <div><p class="eyebrow">에디터 추천</p><h2 class="section-title">이번 주 에디터 픽</h2></div>
          <button class="see-all-btn" data-target="new">전체 보기</button>
        </div>
        <div class="app-list" id="editors-list"></div>
      </div>
    </div>
  </div>

  <!-- Trending Tab -->
  <div class="tab-panel" id="panel-trending">
    <div class="content-area">
      <div class="page-head">
        <h1>인기 프로젝트</h1>
        <div class="filter-pills" id="trending-filters">
          <button class="fpill active" data-filter="all">전체</button>
          <button class="fpill" data-filter="free">무료</button>
          <button class="fpill" data-filter="paid">유료</button>
        </div>
      </div>
      <div class="rank-list" id="rank-list"></div>
    </div>
  </div>

  <!-- New Tab -->
  <div class="tab-panel" id="panel-new">
    <div class="content-area">
      <div class="page-head"><h1>새로 나온</h1></div>
      <div class="app-list-full" id="new-list"></div>
    </div>
  </div>

  <!-- Categories Tab -->
  <div class="tab-panel" id="panel-categories">
    <div class="content-area">
      <div class="page-head"><h1>카테고리</h1></div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>
  </div>

</main>

<!-- Search Overlay -->
<div class="search-overlay" id="search-overlay">
  <div class="search-bar-row">
    <button class="icon-btn" id="search-close-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="search-input-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="바이브 프로젝트 검색..." autocomplete="off">
    </div>
    <button class="cancel-btn" id="search-cancel-btn">취소</button>
  </div>
  <div class="search-body" id="search-body">
    <p class="search-hint">프로젝트 이름, AI 도구, 카테고리로 검색해 보세요</p>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-overlay">
  <div class="modal-backdrop" id="detail-backdrop"></div>
  <div class="modal-sheet" id="detail-sheet">
    <button class="modal-close" id="detail-close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div id="detail-content"></div>
  </div>
</div>

<!-- Submit Modal -->
<div class="modal-overlay" id="submit-overlay">
  <div class="modal-backdrop" id="submit-backdrop"></div>
  <div class="modal-sheet" id="submit-sheet">
    <button class="modal-close" id="submit-close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="submit-body">
      <div class="vibe-notice">
        <span class="vibe-icon">✦</span>
        <div>
          <p class="vibe-title">바이브코딩 전용 스토어</p>
          <p class="vibe-sub">AI 도구로 만든 프로젝트만 등록할 수 있어요</p>
        </div>
      </div>
      <h2>프로젝트 등록</h2>
      <form id="submit-form" novalidate>
        <div class="form-section">
          <div class="field"><label>프로젝트 이름</label><input type="text" name="title" placeholder="My Vibe Project"></div>
          <div class="field"><label>웹사이트 URL</label><input type="url" name="url" placeholder="https://"></div>
          <div class="field"><label>한 줄 설명</label><input type="text" name="desc" placeholder="AI와 함께 만든 프로젝트입니다"></div>
        </div>
        <div class="form-section">
          <div class="field">
            <label>카테고리</label>
            <select name="category">
              <option value="">선택하세요</option>
              <option>SaaS Dashboard</option><option>E-Commerce</option>
              <option>Portfolio</option><option>Landing Page</option>
              <option>Blog</option><option>Game</option>
              <option>Utility</option><option>AI Product</option>
            </select>
          </div>
          <div class="field">
            <label>가격</label>
            <div class="radio-row">
              <label class="radio-opt"><input type="radio" name="pricing" value="free" checked> 무료</label>
              <label class="radio-opt"><input type="radio" name="pricing" value="paid"> 유료</label>
            </div>
          </div>
        </div>
        <div class="ai-section">
          <p class="req-label">사용한 AI 도구 <span class="req-err" id="tool-err">선택해 주세요</span></p>
          <div class="aitool-picker" id="aitool-picker"></div>
        </div>
        <button type="submit" class="submit-cta">등록하기</button>
      </form>
    </div>
  </div>
</div>

<script src="script.js?v=3"></script>
</body>
</html>
